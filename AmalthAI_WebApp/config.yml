paths:
  base_host_path: /data # inside the container
  base_host_path_out: /home/user/kubeflow/kind-data # outside the container

images:
  segmentation: segm_cls_image:latest
  classification: segm_cls_image:latest
  detection: ultralytics/ultralytics:latest

kubeflow:
  namespace: kubeflow

# HESTIA data-lake integration. base_url here is a fallback for bare-metal runs;
# in Docker the HESTIA_BASE_URL / HESTIA_API_KEY env vars (docker-compose) win.
# Use http://api:5000 when co-located on one Docker host, or the public
# https://api.textailes.athenarc.gr when AmalthAI and HESTIA are on different hosts.
hestia:
  enabled: true
  base_url: https://api.textailes.athenarc.gr

defaults:
  pager_size: 30
  lr_lower: 0.001
  lr_upper: 0.1
  bs_lower: 1
  bs_upper: 2
  ep_lower: 1
  ep_upper: 2

  cls_blur: true
  cls_rotate: true
  cls_flip: true

  seg_blur: true
  seg_scale: true
  seg_rotate: true
  seg_flip: true

  det_hue: 0.015
  det_sat: 0.6
  det_val: 0.4
  det_flip: 0.4
  det_rotate: 0.0

