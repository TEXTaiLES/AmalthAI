paths:
  base_host_path: /data # inside the container
  base_host_path_out: /home/user/kubeflow/kind-data # outside the container

images:
  segmentation: segm_cls_image:latest
  classification: segm_cls_image:latest
  detection: ultralytics/ultralytics:latest

kubeflow:
  namespace: kubeflow

directus:
  base_url: DIRECTUS_URL

hestia:
  enabled: true
  base_url: HESTIA_URL

defaults:
  pager_size: 30
  lr_lower: 0.001
  lr_upper: 0.1
  bs_lower: 1
  bs_upper: 2
  ep_lower: 1
  ep_upper: 2

  cls_blur: true
  cls_rotate: true
  cls_flip: true
  cls_scale: true

  seg_blur: true
  seg_scale: true
  seg_rotate: true
  seg_flip: true

  det_flip: true
  det_rotate: true
  det_scale: true