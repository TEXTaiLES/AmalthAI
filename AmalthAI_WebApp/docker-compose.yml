name: amalthai

services:
  amalthai:
    image: amalthai
    container_name: amalthai
    command: []
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/user/kubeflow/kind-data:/data
      - /home/user/.kube/:/root/.kube/
    environment:
      - KUBECONFIG=/root/.kube/config
    ports:
      - "8056:8056"
    networks:
      - textailes
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.amalthai.rule=Host(`amalthai.textailes.athenarc.gr`)"
      - "traefik.http.routers.amalthai.entrypoints=websecure"
      - "traefik.http.routers.amalthai.tls.certresolver=le"
    restart: "always"

networks:
  textailes:
    external: true
